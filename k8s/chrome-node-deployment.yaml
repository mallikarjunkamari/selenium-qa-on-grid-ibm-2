apiVersion: apps/v1
kind: Deployment
metadata:
  name: selenium-node-chrome
  namespace: test-automation
spec:
  replicas: 2 # Number of Chrome browsers you want available
  selector:
    matchLabels:
      app: selenium-node-chrome
  template:
    metadata:
      labels:
        app: selenium-node-chrome
    spec:
      containers:
      - name: selenium-node-chrome
        image: selenium/node-chrome:4.21.0
        env:
        - name: SE_EVENT_BUS_HOST
          value: "selenium-hub"
        - name: SE_EVENT_BUS_PUBLISH_PORT
          value: "4442"
        - name: SE_EVENT_BUS_SUBSCRIBE_PORT
          value: "4443"
        - name: SE_NODE_MAX_SESSIONS
          value: "1" # Maximum concurrent tests per pod
        ports:
        - containerPort: 5555
          protocol: TCP
        # Mount the shared memory volume here to prevent heavy pages from crashing Chrome
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      # Define the RAM-backed shared memory volume at the pod level
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
